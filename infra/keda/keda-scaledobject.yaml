apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: llm-worker-kafka-lag
  namespace: inference-system
spec:
  scaleTargetRef:
    name: llm-worker
  minReplicaCount: 1
  maxReplicaCount: 20
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: llm-inference-workers
        topic: inference_requests
        lagThreshold: "5"
