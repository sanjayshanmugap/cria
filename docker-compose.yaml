services:
  kafka:
    image: bitnamilegacy/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s

  kafka-init:
    image: bitnamilegacy/kafka:3.7
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
    command:
      - /bin/bash
      - -ec
      - |
        for topic in inference_requests.mock inference_requests.tinyllama-1.1b-chat inference_token_events inference_control_events; do
          kafka-topics.sh --bootstrap-server "$${KAFKA_BROKERS}" \
            --create --if-not-exists \
            --topic "$${topic}" \
            --partitions "$${KAFKA_TOPIC_PARTITIONS:-3}" \
            --replication-factor "$${KAFKA_TOPIC_REPLICATION_FACTOR:-1}"
        done

  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "50051:50051"
      - "8080:8080"
      - "9090:9090"
    environment:
      KAFKA_BROKERS: kafka:9092
      MODEL_ROUTES: mock=inference_requests.mock,tinyllama-1.1b-chat=inference_requests.tinyllama-1.1b-chat
      DEFAULT_MODEL_ID: mock
      RUST_LOG: info

  worker:
    build:
      context: .
      dockerfile: workers/python/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      control-plane:
        condition: service_started
    environment:
      KAFKA_BROKERS: kafka:9092
      MODEL_ID: mock
      KAFKA_REQUEST_TOPIC: inference_requests.mock
      BACKEND: mock
      METRICS_PORT: 9100
    deploy:
      replicas: 2

  worker-llm:
    profiles: ["llm"]
    build:
      context: .
      dockerfile: workers/python/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      control-plane:
        condition: service_started
    environment:
      KAFKA_BROKERS: kafka:9092
      MODEL_ID: tinyllama-1.1b-chat
      KAFKA_REQUEST_TOPIC: inference_requests.tinyllama-1.1b-chat
      BACKEND: transformers
      MODEL_NAME: TinyLlama/TinyLlama-1.1B-Chat-v1.0
      DEVICE: auto
      DTYPE: float16
      METRICS_PORT: 9100
    deploy:
      replicas: 1

  prometheus:
    image: prom/prometheus:v2.55.1
    depends_on:
      control-plane:
        condition: service_started
      worker:
        condition: service_started
    ports:
      - "9091:9090"
    volumes:
      - ./infra/observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
