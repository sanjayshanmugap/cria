apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-control-plane
  namespace: inference-system
  labels:
    app: rust-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rust-control-plane
  template:
    metadata:
      labels:
        app: rust-control-plane
    spec:
      containers:
        - name: control-plane
          image: distributed-llm/control-plane:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9090
              name: metrics
          env:
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: RUST_LOG
              value: info
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rust-control-plane
  namespace: inference-system
spec:
  selector:
    app: rust-control-plane
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
    - name: metrics
      port: 9090
      targetPort: metrics
