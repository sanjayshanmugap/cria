apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-worker
  namespace: inference-system
  labels:
    app: llm-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-worker
  template:
    metadata:
      labels:
        app: llm-worker
    spec:
      containers:
        - name: worker
          image: distributed-llm/worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9100
              name: metrics
          env:
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: BACKEND
              value: mock
            - name: METRICS_PORT
              value: "9100"
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
