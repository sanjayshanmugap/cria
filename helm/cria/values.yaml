namespace:
  create: true
  name: inference-system

kafka:
  enabled: true
  image: bitnamilegacy/kafka:3.7
  topicPartitions: 3
  topicReplicationFactor: 1

controlPlane:
  image: cria/control-plane:dev
  imagePullPolicy: Never
  replicas: 1
  grpcPort: 50051
  httpPort: 8080
  metricsPort: 9090
  logLevel: info
  resources: {}

mtls:
  enabled: false
  existingSecret: cria-grpc-mtls

models:
  - id: mock
    backend: mock
    topic: inference_requests.mock
    image: cria/worker:dev
    imagePullPolicy: Never
    replicas: 2
    modelName: TinyLlama/TinyLlama-1.1B-Chat-v1.0
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
  - id: tinyllama-1.1b-chat
    backend: transformers
    topic: inference_requests.tinyllama-1.1b-chat
    image: cria/worker:dev
    imagePullPolicy: Never
    replicas: 0
    modelName: TinyLlama/TinyLlama-1.1B-Chat-v1.0
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "4"
        memory: 8Gi

defaultModelId: mock

autoscaling:
  hpa:
    enabled: true
    maxReplicas: 10
    cpuUtilization: 70
  keda:
    enabled: false
    maxReplicas: 20
    lagThreshold: "5"

prometheus:
  enabled: true
