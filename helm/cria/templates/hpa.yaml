{{- if .Values.autoscaling.hpa.enabled }}
{{- range .Values.models }}
{{- $modelName := include "cria.sanitizeModelId" .id }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llm-worker-{{ $modelName }}-hpa
  namespace: {{ include "cria.namespace" $ }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llm-worker-{{ $modelName }}
  minReplicas: 1
  maxReplicas: {{ $.Values.autoscaling.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $.Values.autoscaling.hpa.cpuUtilization }}
---
{{- end }}
{{- end }}
