{{- if .Values.autoscaling.keda.enabled }}
{{- range .Values.models }}
{{- $modelName := include "cria.sanitizeModelId" .id }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: llm-worker-{{ $modelName }}-kafka-lag
  namespace: {{ include "cria.namespace" $ }}
spec:
  scaleTargetRef:
    name: llm-worker-{{ $modelName }}
  minReplicaCount: 1
  maxReplicaCount: {{ $.Values.autoscaling.keda.maxReplicas }}
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: llm-inference-workers-{{ .id }}
        topic: {{ .topic }}
        lagThreshold: {{ $.Values.autoscaling.keda.lagThreshold | quote }}
---
{{- end }}
{{- end }}
